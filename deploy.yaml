apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-alertmanager-feishu
  namespace: monitoring
  labels:
    app: go-alertmanager-feishu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-alertmanager-feishu
  template:
    metadata:
      labels:
        app: go-alertmanager-feishu
    spec:
      containers:
        - name: go-alertmanager-feishu
          image: registry.cn-beijing.aliyuncs.com/ning1875_haiwai_image/go-alertmanager-feishu:v1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          # 命令行参数
          # 可以添加过滤参数
          # - "--namespaces=default,kube-system"
          # - "--event-types=Warning"
          env:
            - name: FEISHU_WEBHOOK
              value: "https://open.feishu.cn/open-apis/bot/v2/hook/842123d7-9bae-4a11-a65b-795921637611"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: go-alertmanager-feishu
  name: go-alertmanager-feishu
  namespace: monitoring
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
  selector:
    app: go-alertmanager-feishu
